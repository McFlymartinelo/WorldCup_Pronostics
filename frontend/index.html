<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="CdM 2026" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>Pronostics Coupe du Monde</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface:  '#161b27',
            bg:       '#0f1117',
            border:   '#1e2535',
            muted:    '#64748b',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body class="bg-bg text-slate-200 min-h-screen">

  <!-- Vue : Login -->
  <div id="view-login" class="view flex flex-col items-center justify-center min-h-screen px-6">
    <div class="text-5xl mb-4">🏆</div>
    <h1 class="text-2xl font-bold text-white mb-1">Pronostics CdM 2026</h1>
    <p class="text-sm text-muted mb-8">Connecte-toi pour jouer</p>
    <div class="w-full max-w-xs">
      <div class="flex gap-2 mb-5">
        <button id="tab-login"    class="tab active flex-1">Connexion</button>
        <button id="tab-register" class="tab flex-1">Inscription</button>
      </div>
      <input id="input-pseudo"   type="text"     placeholder="Pseudo"      class="input-field mb-3" autocomplete="username" />
      <input id="input-password" type="password" placeholder="Mot de passe" class="input-field mb-3" autocomplete="current-password" />

      <div id="register-pool-section" class="hidden mb-4">
        <p class="text-xs font-semibold text-muted uppercase tracking-wider mb-2">Rejoindre un groupe</p>
        <div class="flex gap-2 mb-3">
          <button type="button" id="reg-pool-tab-select" class="tab flex-1 text-xs active">Choisir un groupe</button>
          <button type="button" id="reg-pool-tab-code" class="tab flex-1 text-xs">Code d'accès</button>
        </div>
        <select id="input-pool-select" class="input-field w-full text-sm">
          <option value="">Chargement…</option>
        </select>
        <input id="input-pool-code-reg" type="text"
               placeholder="Ex. CDM7X2K" maxlength="8"
               class="input-field w-full text-sm uppercase hidden" />
      </div>

      <button id="btn-auth" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition">
        Se connecter
      </button>
      <p id="auth-error" class="text-red-400 text-sm text-center mt-3 hidden"></p>
    </div>
  </div>

  <!-- App Shell (cachée jusqu'à login) -->
  <div id="app-shell" class="hidden flex flex-col min-h-screen max-w-lg mx-auto">

    <!-- Topbar -->
    <header class="bg-surface border-b border-border px-4 py-3 flex items-center justify-between sticky top-0 z-20">
      <div class="flex items-center gap-2 min-w-0 flex-1">
        <span class="text-lg shrink-0">🏆</span>
        <div class="min-w-0">
          <span class="font-semibold text-white text-sm block">Pronostics CdM 2026</span>
          <button id="btn-pool-selector" type="button"
                  class="text-xs text-blue-300 hover:text-blue-200 truncate max-w-[200px] block text-left">
            Chargement…
          </button>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span id="header-pseudo" class="text-xs text-muted bg-border px-3 py-1 rounded-full"></span>
        <button id="btn-logout" class="text-muted hover:text-white transition" title="Déconnexion">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Contenu principal -->
    <main class="flex-1 overflow-y-auto pb-20">

      <!-- Vue : Matchs -->
      <div id="view-matches" class="view p-4"></div>

      <!-- Vue : Détail match -->
      <div id="view-detail" class="view p-4 hidden"></div>

      <!-- Vue : Classement -->
      <div id="view-standings" class="view p-4 hidden"></div>

      <!-- Vue : Tableau -->
      <div id="view-tournament" class="view p-4 hidden"></div>

      <!-- Vue : Admin -->
      <div id="view-admin" class="view p-4 hidden"></div>

      <!-- Vue : Profile -->
      <div id="view-profile" class="view p-4 hidden"></div>

      <!-- Vue : Chat -->
      <div id="view-chat" class="view hidden chat-view"></div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bg-surface border-t border-border fixed bottom-0 left-0 right-0 flex max-w-lg mx-auto z-20">
      <button class="nav-btn active" data-view="matches">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span>Matchs</span>
      </button>
      <button class="nav-btn" data-view="standings">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span>Classement</span>
      </button>
      <button class="nav-btn" data-view="chat">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        <span>Chat</span>
      </button>
      <button class="nav-btn hidden" data-view="tournament" id="nav-tournament">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M3 14h18M10 3v18"/>
        </svg>
        <span>Tableau</span>
      </button>
      <button class="nav-btn hidden" data-view="admin" id="nav-admin">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4"/><path stroke-linecap="round" d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <span>Admin</span>
      </button>
      <button class="nav-btn" data-view="profile">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4"/>
          <path stroke-linecap="round" d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <span>Profil</span>
      </button>
    </nav>

    <!-- Modal groupes -->
    <div id="pool-modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 bg-black/60">
      <div class="bg-surface border border-border rounded-2xl w-full max-w-sm max-h-[85vh] overflow-y-auto p-4">
        <div class="flex items-center justify-between mb-4">
          <p class="text-sm font-semibold text-white">Mes groupes</p>
          <button id="btn-pool-close" type="button" class="text-muted hover:text-white text-lg leading-none">&times;</button>
        </div>
        <div id="pool-list" class="space-y-2 mb-4"></div>
        <div class="border-t border-border pt-4 space-y-3">
          <div>
            <label class="text-xs text-muted block mb-1">Créer un groupe</label>
            <div class="flex gap-2">
              <input id="input-pool-name" type="text" placeholder="Ex. Les potes du boulot"
                     class="input-field flex-1 text-sm" maxlength="40" />
              <button id="btn-pool-create" type="button"
                      class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-3 rounded-xl shrink-0">
                Créer
              </button>
            </div>
          </div>
          <div>
            <label class="text-xs text-muted block mb-1">Rejoindre avec un code</label>
            <div class="flex gap-2">
              <input id="input-pool-code" type="text" placeholder="Ex. CDM7X2K"
                     class="input-field flex-1 text-sm uppercase" maxlength="8" />
              <button id="btn-pool-join" type="button"
                      class="bg-slate-700 hover:bg-slate-600 text-white text-xs font-semibold px-3 rounded-xl shrink-0">
                Rejoindre
              </button>
            </div>
          </div>
          <p id="pool-msg" class="text-xs text-center hidden"></p>
        </div>
      </div>
    </div>

  </div>

  <script src="translations.js?v=21"></script>
  <script src="api.js?v=23"></script>
  <script src="js/state.js?v=23"></script>
  <script src="js/toast.js?v=21"></script>
  <script src="js/utils.js?v=24"></script>
  <script src="js/avatars.js?v=32"></script>
  <script src="js/pools.js?v=24"></script>
  <script src="js/notifications.js?v=23"></script>
  <script src="js/chat.js?v=23"></script>
  <script src="js/matches.js?v=26"></script>
  <script src="js/standings.js?v=27"></script>
  <script src="js/tournament.js?v=23"></script>
  <script src="js/admin.js?v=23"></script>
  <script src="js/profile.js?v=31"></script>
  <script src="js/router.js?v=23"></script>
  <script src="js/auth.js?v=24"></script>
  <script src="js/app.js?v=25"></script>
</body>
</html>
