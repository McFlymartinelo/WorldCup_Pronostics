# Réveille le service Render (plan Free) toutes les ~14 minutes.
# Inutile si vous êtes en plan Starter+ (déjà allumé 24/7).
#
# Configuration GitHub (repo → Settings → Secrets and variables → Actions) :
#   Secret RENDER_APP_URL = https://votre-app.onrender.com  (sans slash final)

name: Keep Render awake

on:
  schedule:
    # Toutes les 14 min (Render Free dort après ~15 min sans requête)
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping health endpoint
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
        run: |
          if [ -z "$RENDER_APP_URL" ]; then
            echo "RENDER_APP_URL secret not set — skip (disable workflow or add secret)"
            exit 0
          fi
          URL="${RENDER_APP_URL%/}/api/health"
          echo "GET $URL"
          curl -sf --max-time 120 "$URL"
          echo " OK"
